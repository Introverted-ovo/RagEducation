<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 知识助手 - 对话工作台</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>RAG 知识助手</h1>
                <button class="new-chat-btn" id="newChatBtn">+ 新建会话</button>
            </div>
            <div class="conversation-list" id="conversationList"></div>
            <div class="sidebar-footer">
                <button class="nav-btn" id="toKnowledgeBtn">知识库管理</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="chat-header">
                <h2 id="chatTitle">新会话</h2>
                <button class="header-nav-btn" id="headerToKnowledgeBtn">知识库管理</button>
            </header>

            <div class="message-container" id="messageContainer">
                <div class="empty-state" id="emptyState">
                    <div class="icon">💬</div>
                    <p>开始对话吧！发送消息开始聊天</p>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea
                        class="message-input"
                        id="messageInput"
                        placeholder="输入你的问题..."
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="sendBtn">发送</button>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="deleteConfirmModal">
        <div class="modal">
            <div class="modal-header">
                <h3>确认删除</h3>
                <button class="modal-close" id="closeDeleteModal">&times;</button>
            </div>
            <div class="modal-content">
                <p>确定要删除这个会话吗？此操作无法撤销。</p>
            </div>
            <div style="margin-top: 20px; display: flex; gap: 12px; justify-content: flex-end;">
                <button class="submit-btn" style="background-color: #6c757d;" id="cancelDeleteBtn">取消</button>
                <button class="submit-btn" id="confirmDeleteBtn">删除</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="./js/chat.js"></script>
</body>
</html>
