<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 知识助手 - 知识库管理</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="knowledge-container">
        <div class="knowledge-header">
            <button class="back-btn" id="backBtn">← 返回对话</button>
            <h2>知识库管理中心</h2>
        </div>

        <div class="knowledge-layout">
            <div class="knowledge-panel">
                <h3 class="panel-title">文档上传</h3>
                <div class="upload-area" id="uploadArea">
                    <div class="icon">📄</div>
                    <p>拖拽文件到此处，或点击选择文件</p>
                    <p style="font-size: 12px; color: #999; margin-top: 4px;">支持 PDF、Word、TXT 等格式</p>
                </div>
                <input type="file" id="fileInput" multiple accept=".pdf,.doc,.docx,.txt" style="display: none;">
                <div class="upload-progress" id="uploadProgress">
                    <p style="font-size: 13px; margin-bottom: 8px;">上传中...</p>
                    <div class="progress-bar">
                        <div class="progress" id="progressBar"></div>
                    </div>
                </div>

                <h3 class="panel-title" style="margin-top: 24px;">手动录入</h3>
                <form class="manual-form" id="manualForm">
                    <div class="form-group">
                        <label for="itemTitle">标题</label>
                        <input type="text" id="itemTitle" placeholder="请输入知识条目标题" required>
                    </div>
                    <div class="form-group">
                        <label for="itemContent">内容</label>
                        <textarea id="itemContent" placeholder="请输入知识条目内容" required></textarea>
                    </div>
                    <div class="form-group">
                        <label>标签</label>
                        <div class="form-tags">
                            <input type="text" class="tag-input" id="tagInput" placeholder="输入标签后按回车添加">
                            <div id="tagList" style="display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px;"></div>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">提交入库</button>
                </form>
            </div>

            <div class="knowledge-list-panel">
                <h3 class="panel-title">知识条目列表</h3>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="输入关键词搜索...">
                    <button class="search-btn" id="searchBtn">搜索</button>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>标题</th>
                            <th>标签</th>
                            <th>来源</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="knowledgeTableBody">
                    </tbody>
                </table>
                <div class="pagination" id="pagination">
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header">
                <h3>知识条目详情</h3>
                <button class="modal-close" id="closeDetailModal">&times;</button>
            </div>
            <div class="modal-content" id="detailContent">
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h3>编辑知识条目</h3>
                <button class="modal-close" id="closeEditModal">&times;</button>
            </div>
            <form class="manual-form" id="editForm">
                <input type="hidden" id="editItemId">
                <div class="form-group">
                    <label for="editTitle">标题</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label for="editContent">内容</label>
                    <textarea id="editContent" required></textarea>
                </div>
                <div class="form-group">
                    <label>标签</label>
                    <div class="form-tags">
                        <input type="text" class="tag-input" id="editTagInput" placeholder="输入标签后按回车添加">
                        <div id="editTagList" style="display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px;"></div>
                    </div>
                </div>
                <div style="margin-top: 20px; display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" class="submit-btn" style="background-color: #6c757d;" id="cancelEditBtn">取消</button>
                    <button type="submit" class="submit-btn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="deleteConfirmModal">
        <div class="modal">
            <div class="modal-header">
                <h3>确认删除</h3>
                <button class="modal-close" id="closeDeleteModal">&times;</button>
            </div>
            <div class="modal-content">
                <p>确定要删除这个知识条目吗？此操作无法撤销。</p>
            </div>
            <div style="margin-top: 20px; display: flex; gap: 12px; justify-content: flex-end;">
                <button class="submit-btn" style="background-color: #6c757d;" id="cancelDeleteBtn">取消</button>
                <button class="submit-btn" id="confirmDeleteBtn">删除</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="./js/knowledge.js"></script>
</body>
</html>
