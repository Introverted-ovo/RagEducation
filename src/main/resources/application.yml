spring:
  application:
    name: rag-education
  main:
    allow-bean-definition-overriding: true

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: gemma3
      embedding:
        options:
          model: nomic-embed-text
    vectorstore:
      chroma:
        base-url: http://localhost:8000
        collection-name: rag-knowledge-base
        tenant: SpringAiTenant
        database: SpringAiDatabase

  datasource:
    url: jdbc:h2:file:./data/ragdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

app:
  rag:
    default-top-k: 5
    similarity-threshold: 0.7
    upload-path: ./uploads